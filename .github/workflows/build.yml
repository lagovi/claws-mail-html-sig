name: Build Claws Mail Plugin

on:
  push:
    branches:[ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-gtk3
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-claws-mail
          wget
          tar
          make

    - name: Download Claws Mail Source Headers
      run: |
        wget https://www.claws-mail.org/releases/claws-mail-4.4.0.tar.xz
        tar -xf claws-mail-4.4.0.tar.xz
        mv claws-mail-4.4.0 claws-mail
        
    - name: Build Plugin DLL
      run: make

    - name: Upload DLL to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: html_sig_plugin
        path: html_sig.dll
