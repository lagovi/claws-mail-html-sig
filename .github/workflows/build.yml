name: Build Claws Mail Plugin

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-gtk3
          mingw-w64-x86_64-pkgconf
          p7zip
          wget
          tar

    - name: Download Claws Mail Source and Windows Binary
      run: |
        wget https://www.claws-mail.org/releases/claws-mail-4.4.0.tar.xz
        tar -xf claws-mail-4.4.0.tar.xz
        mv claws-mail-4.4.0 claws-mail
        
        wget https://www.claws-mail.org/win32/claws-mail-4.4.0-1-64bit.exe
        7z x claws-mail-4.4.0-1-64bit.exe -oapp

    - name: Build Plugin DLL
      run: |
        CLAWS_EXE=$(find app -name "claws-mail.exe" | head -n 1)
        GLIB_DLL=$(find app -name "libglib-2.0-0.dll" | head -n 1)
        
        echo "Linking against native binaries:"
        echo "$CLAWS_EXE"
        echo "$GLIB_DLL"
        
        # Компилируем, подключая ТОЛЬКО родные библиотеки Claws Mail (избавляемся от DLL Hell)
        gcc -shared -O2 -Wall -s -static-libgcc -fno-stack-protector \
          -I claws-mail/src \
          -I claws-mail/src/common \
          $(pkg-config --cflags gtk+-3.0 glib-2.0) \
          -o html_sig.dll html_sig.c \
          -Wl,--enable-auto-import \
          "$CLAWS_EXE" \
          "$GLIB_DLL"

    - name: Upload DLL to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: html_sig_plugin
        path: html_sig.dll
